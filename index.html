<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Beach" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#3b8eea" />
  <title>Beach Companion</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="stylesheet" href="style.css?v=1.4.14" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Beach Companion</h1>
      </div>
      <select id="beachSelect" aria-label="Beach"></select>
    </header>

    <p id="status" class="status header-status">Loading…</p>

    <section class="day-strip" aria-label="Day selector">
      <div id="daySelector" class="day-selector"></div>
    </section>

    <section id="beachNotes" class="card">
  <h2>Beach Notes</h2>
  <ul id="notesList">
    <li>No special notes</li>
  </ul>
</section>

    <section class="grid">
      <article class="card">
        <h2 id="weatherCardTitle">Now</h2>
        <div class="metric-row">
          <div>
            <div id="airLabel" class="label">Air</div>
            <div id="airTemp" class="value">--</div>
          </div>
          <div>
            <div id="windLabel" class="label">Wind</div>
            <div id="wind" class="value">--</div>
          </div>
        </div>
        <div class="updated" id="weatherUpdated"></div>
      </article>

      <article class="card">
        <h2>Ocean</h2>
        <div class="metric-row single">
          <div>
            <div class="label">Water Temp</div>
            <div id="waterTemp" class="value">--</div>
          </div>
        </div>
        <div class="updated" id="waterUpdated"></div>
      </article>
    </section>

    <section class="card">
      <h2 id="tidesTitle">Tides Today</h2>
      <div id="nextTide" class="next-tide">--</div>
      <div id="moonPhase"></div>
      <div id="tideList" class="tide-list"></div>
    </section>

    <section class="card">
      <h2>Sun & Moon</h2>
      <div class="astro-list">
        <div class="astro-item"><span>Sunrise</span><span id="sunriseTime">--</span></div>
        <div class="astro-item"><span>Sunset</span><span id="sunsetTime">--</span></div>
        <div class="astro-item"><span>Moonrise</span><span id="moonriseTime">--</span></div>
        <div class="astro-item"><span>Moonset</span><span id="moonsetTime">--</span></div>
      </div>
    </section>

    <section class="card">
      <h2>Wind</h2>
      <div id="windChart" class="wind-chart">Wind chart unavailable.</div>
    </section>

    <section class="card">
      <h2>Temperature</h2>
      <div id="temperatureChart" class="day-chart">Temperature chart unavailable.</div>
    </section>

    <section class="card">
      <h2>Precipitation</h2>
      <div id="precipitationChart" class="day-chart">Precipitation chart unavailable.</div>
    </section>
  </main>

  <script src="astronomy.browser.min.js?v=1.4.14"></script>
  <script src="app.js?v=1.4.14"></script>
</body>
</html>
